name: Test install scripts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      nvim: ${{ steps.filter.outputs.nvim }}
      kitty: ${{ steps.filter.outputs.kitty }}
      starship: ${{ steps.filter.outputs.starship }}
      zk: ${{ steps.filter.outputs.zk }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            nvim:
              - 'install/nvim.sh'
              - 'install/lib/common.sh'
              - 'nvim/**'
              - '.github/workflows/test-install-scripts.yml'
            kitty:
              - 'install/kitty.sh'
              - 'install/lib/common.sh'
              - 'kitty/**'
              - '.github/workflows/test-install-scripts.yml'
            starship:
              - 'install/starship.sh'
              - 'install/lib/common.sh'
              - 'starship/**'
              - '.github/workflows/test-install-scripts.yml'
            zk:
              - 'install/zk.sh'
              - 'install/lib/common.sh'
              - 'zk/**'
              - '.github/workflows/test-install-scripts.yml'

  test-nvim-install:
    needs: changes
    if: needs.changes.outputs.nvim == 'true' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    strategy:
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run nvim install script
        shell: bash
        run: |
          chmod +x ./install/nvim.sh
          ./install/nvim.sh

      - name: Verify nvim installation
        shell: bash
        run: |
          echo "═══════════════════════════════════════════════════════"
          echo "  Verifying Neovim Installation"
          echo "═══════════════════════════════════════════════════════"

          export PATH="$HOME/.local/bin:$PATH"

          which nvim || (echo "nvim not found" && exit 1)
          echo
          nvim --version | head -5

      - name: Verify nvim config files
        shell: bash
        run: |
          echo "═══════════════════════════════════════════════════════"
          echo "  Verifying Configuration Files"
          echo "═══════════════════════════════════════════════════════"

          [ -f "$HOME/.config/nvim/init.lua" ] || (echo "init.lua not found" && exit 1)
          echo "init.lua found"

          [ -f "$HOME/.config/nvim/nvim-pack-lock.json" ] || (echo "nvim-pack-lock.json not found" && exit 1)
          echo "nvim-pack-lock.json found"

          [ -f "$HOME/.config/nvim/stylua.toml" ] || (echo "stylua.toml not found" && exit 1)
          echo "stylua.toml found"

          [ -d "$HOME/.config/nvim/after" ] || (echo "after directory not found" && exit 1)
          echo "after/ directory found"

          [ -d "$HOME/.config/nvim/lua" ] || (echo "lua directory not found" && exit 1)
          echo "lua/ directory found"

          [ -d "$HOME/.config/nvim/lua/plugins" ] || (echo "lua/plugins directory not found" && exit 1)
          echo "lua/plugins/ directory found"

          echo
          ls -la "$HOME/.config/nvim/"
          echo
          ls -la "$HOME/.config/nvim/lua/"
          echo
          ls -la "$HOME/.config/nvim/lua/plugins/"

      - name: Test nvim startup
        shell: bash
        run: |
          echo "═══════════════════════════════════════════════════════"
          echo "  Testing Neovim Startup"
          echo "═══════════════════════════════════════════════════════"

          export PATH="$HOME/.local/bin:$PATH"

          nvim --headless "+qa" || exit 1
          echo "Neovim startup test passed"

  test-kitty-install:
    needs: changes
    if: needs.changes.outputs.kitty == 'true' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    strategy:
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run kitty install script
        shell: bash
        run: |
          chmod +x ./install/kitty.sh
          ./install/kitty.sh

      - name: Verify Kitty installation
        shell: bash
        run: |
          echo "══════════════════════════════════════════════════════"
          echo "  Verifying Kitty"
          echo "══════════════════════════════════════════════════════"

          export PATH="$HOME/.local/bin:$PATH"

          if [[ "$(uname -s)" == "Darwin" ]]; then
            if [ -d "$HOME/.local/kitty.app" ]; then
              KITTY_BIN="$HOME/.local/kitty.app/bin/kitty"
            elif [ -d "$HOME/Applications/kitty.app" ]; then
              KITTY_BIN="$HOME/Applications/kitty.app/Contents/MacOS/kitty"
            elif [ -d "/Applications/kitty.app" ]; then
              KITTY_BIN="/Applications/kitty.app/Contents/MacOS/kitty"
            else
              echo "Kitty.app not found"
              exit 1
            fi
            "$KITTY_BIN" --version | head -1
          else
            [ -f "$HOME/.local/kitty.app/bin/kitty" ] || (echo "kitty binary not found" && exit 1)
            "$HOME/.local/kitty.app/bin/kitty" --version | head -1
          fi

      - name: Verify Kitty config files
        shell: bash
        run: |
          echo "══════════════════════════════════════════════════════"
          echo "  Verifying Kitty Configuration Files"
          echo "══════════════════════════════════════════════════════"

          [ -f "$HOME/.config/kitty/kitty.conf" ] || (echo "kitty.conf not found" && exit 1)
          echo "kitty.conf found"

          [ -f "$HOME/.config/kitty/zoom_toggle.py" ] || (echo "zoom_toggle.py not found" && exit 1)
          echo "zoom_toggle.py found"

          [ -f "$HOME/.config/kitty/custom-hints.py" ] || (echo "custom-hints.py not found" && exit 1)
          echo "custom-hints.py found"

          [ -f "$HOME/.config/kitty/current-theme.conf" ] || (echo "current-theme.conf not found" && exit 1)
          echo "current-theme.conf found"

          echo
          ls -la "$HOME/.config/kitty/"

      - name: Verify font installation
        shell: bash
        run: |
          echo "══════════════════════════════════════════════════════"
          echo "  Verifying Font Installation"
          echo "══════════════════════════════════════════════════════"

          FONT_FOUND=0

          if [[ "$(uname -s)" == "Darwin" ]]; then
            if ls "$HOME/Library/Fonts"/JetBrainsMono* >/dev/null 2>&1; then
              FONT_FOUND=1
              echo "JetBrainsMono fonts found in ~/Library/Fonts"
            fi
          else
            if ls "$HOME/.local/share/fonts/JetBrainsMono"/* >/dev/null 2>&1; then
              FONT_FOUND=1
              echo "JetBrainsMono fonts found in ~/.local/share/fonts/JetBrainsMono"
            fi

            if [ "$FONT_FOUND" -eq 0 ] && command -v fc-list >/dev/null 2>&1; then
              if fc-list | grep -i "JetBrainsMono" >/dev/null; then
                FONT_FOUND=1
                echo "JetBrainsMono found in font cache"
              fi
            fi
          fi

          if [ "$FONT_FOUND" -eq 0 ]; then
            echo "JetBrainsMono fonts not installed"
            exit 1
          fi

  test-starship-install:
    needs: changes
    if: needs.changes.outputs.starship == 'true' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    strategy:
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run starship install script
        shell: bash
        run: |
          chmod +x ./install/starship.sh
          ./install/starship.sh

      - name: Verify Starship installation
        shell: bash
        run: |
          echo "══════════════════════════════════════════════════════"
          echo "  Verifying Starship"
          echo "══════════════════════════════════════════════════════"

          if [[ "$(uname -s)" == "Darwin" ]]; then
            eval "$(/opt/homebrew/bin/brew shellenv)" || eval "$(/usr/local/bin/brew shellenv)"
          fi

          which starship || [ -f /usr/local/bin/starship ] || (echo "starship not found" && exit 1)

          if command -v starship >/dev/null 2>&1; then
            starship --version | head -1
          else
            /usr/local/bin/starship --version | head -1
          fi

      - name: Verify Starship config
        shell: bash
        run: |
          echo "══════════════════════════════════════════════════════"
          echo "  Verifying Starship Configuration"
          echo "══════════════════════════════════════════════════════"

          [ -f "$HOME/.config/starship.toml" ] || (echo "starship.toml not found" && exit 1)
          echo "starship.toml found"

      - name: Verify shell init lines
        shell: bash
        run: |
          grep -F 'eval "$(starship init bash)"' "$HOME/.bashrc" >/dev/null || (echo "bash init line missing" && exit 1)
          grep -F 'eval "$(starship init zsh)"' "$HOME/.zshrc" >/dev/null || (echo "zsh init line missing" && exit 1)
          echo "Shell init lines found"

  test-zk-install:
    needs: changes
    if: needs.changes.outputs.zk == 'true' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    strategy:
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run zk install script
        shell: bash
        run: |
          chmod +x ./install/zk.sh
          ./install/zk.sh

      - name: Verify zk installation
        shell: bash
        run: |
          echo "══════════════════════════════════════════════════════"
          echo "  Verifying zk Installation"
          echo "══════════════════════════════════════════════════════"

          export PATH="$HOME/.local/bin:$PATH"

          which zk || (echo "zk not found" && exit 1)
          echo
          zk --version | head -1

      - name: Verify zk notebook bootstrap
        shell: bash
        run: |
          echo "══════════════════════════════════════════════════════"
          echo "  Verifying zk Notebook Bootstrap"
          echo "══════════════════════════════════════════════════════"

          NOTEBOOK_DIR="$HOME/notebook"

          [ -d "$NOTEBOOK_DIR" ] || (echo "notebook directory not found" && exit 1)
          echo "notebook directory found"

          [ -d "$NOTEBOOK_DIR/.zk" ] || (echo ".zk directory not found" && exit 1)
          echo ".zk directory found"

          [ -f "$NOTEBOOK_DIR/.zk/config.toml" ] || (echo "config.toml not found" && exit 1)
          echo "config.toml found"

          [ -d "$NOTEBOOK_DIR/.zk/templates" ] || (echo "templates directory not found" && exit 1)
          echo "templates directory found"

          find "$NOTEBOOK_DIR/.zk/templates" -type f | grep . >/dev/null || (echo "no templates found" && exit 1)
          echo "template files found"

          [ -d "$NOTEBOOK_DIR/meeting" ] || (echo "meeting directory not found" && exit 1)
          echo "meeting/ directory found"

          [ -d "$NOTEBOOK_DIR/daily" ] || (echo "daily directory not found" && exit 1)
          echo "daily/ directory found"

          echo
          ls -la "$NOTEBOOK_DIR"
          echo
          ls -la "$NOTEBOOK_DIR/.zk"
          echo
          find "$NOTEBOOK_DIR/.zk/templates" -maxdepth 1 -type f -print

      - name: Verify zk shell init lines
        shell: bash
        run: |
          grep -F 'export PATH="$HOME/.local/bin:$PATH"' "$HOME/.bashrc" >/dev/null || (echo "bash PATH line missing" && exit 1)
          grep -F 'export ZK_NOTEBOOK_DIR="$HOME/notebook"' "$HOME/.bashrc" >/dev/null || (echo "bash ZK_NOTEBOOK_DIR line missing" && exit 1)
          grep -F 'export PATH="$HOME/.local/bin:$PATH"' "$HOME/.zshrc" >/dev/null || (echo "zsh PATH line missing" && exit 1)
          grep -F 'export ZK_NOTEBOOK_DIR="$HOME/notebook"' "$HOME/.zshrc" >/dev/null || (echo "zsh ZK_NOTEBOOK_DIR line missing" && exit 1)
          echo "Shell init lines found"

      - name: Smoke test zk commands
        shell: bash
        run: |
          echo "══════════════════════════════════════════════════════"
          echo "  Smoke Testing zk"
          echo "══════════════════════════════════════════════════════"

          export PATH="$HOME/.local/bin:$PATH"
          export ZK_NOTEBOOK_DIR="$HOME/notebook"

          cd "$ZK_NOTEBOOK_DIR"

          zk list --limit 1 >/dev/null

          created_note="$(zk new --title "CI Smoke Test" --no-input --print-path)"
          [ -f "$created_note" ] || (echo "zk smoke test note was not created" && exit 1)

          echo "zk smoke test passed"
          echo "Created note: $created_note"

  tests-complete:
    name: All Tests Complete
    runs-on: ubuntu-latest
    needs:
      - changes
      - test-nvim-install
      - test-kitty-install
      - test-starship-install
      - test-zk-install
    if: always()
    steps:
      - name: Check test results
        run: |
          echo "Checking test results..."

          if [[ "${{ needs.test-nvim-install.result }}" == "failure" ]] || \
             [[ "${{ needs.test-kitty-install.result }}" == "failure" ]] || \
             [[ "${{ needs.test-starship-install.result }}" == "failure" ]] || \
             [[ "${{ needs.test-zk-install.result }}" == "failure" ]]; then
            echo "One or more tests failed"
            exit 1
          fi

          echo "All required tests passed or were skipped appropriately"

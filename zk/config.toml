[note]
language = "en"
default-title = "Untitled"
filename = "{{id}}"
extension = "md"
template = "default.md"
id-charset = "alphanum"
id-length = 8
id-case = "lower"

[extra]
author = "Junhyeok Ahn"

[group.daily]
paths = ["daily"]

[group.daily.note]
filename = "{{format-date now}}"
extension = "md"
template = "daily.md"

[group.meeting]
paths = ["meeting"]

[group.meeting.note]
filename = "{{id}}"
extension = "md"
template = "meeting.md"

[format.markdown]
hashtags = true
colon-tags = true

[tool]
editor = "nvim"
pager = "less -FIRX"
fzf-preview = "bat -p --color always {-1}"

[lsp]
[lsp.diagnostics]
wiki-title = "hint"
dead-link = "error"
missing-backlink = { level = "warning", position = "bottom" }
